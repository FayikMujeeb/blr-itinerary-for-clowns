<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♡ The Places ♡</title>
<style>
/* ---- inlined shared stylesheet ---- */
/* ============================================
   ZARA'S BANGALORE — shared Y2K / 2000s-2010s pop stylesheet
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Sora:wght@400;600;700;800&display=swap');

:root{
  --hot-pink:#ff2e9a;
  --bubblegum:#ff7bd5;
  --baby-pink:#ffd6ef;
  --cream:#fff0fb;
  --lilac:#c89bff;
  --sky:#9be7ff;
  --lime:#c6ff5e;
  --ink:#3a0b35;
  --deep:#7a0f5c;
  --white:#ffffff;
  --shadow:6px 6px 0 rgba(58,11,53,.18);
  --shadow-hard:5px 5px 0 var(--ink);
  --radius:22px;
}

*{box-sizing:border-box;margin:0;padding:0;}

html{scroll-behavior:smooth;}

body{
  font-family:'Poppins',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 18%, rgba(255,123,213,.35), transparent 40%),
    radial-gradient(circle at 88% 8%, rgba(200,155,255,.32), transparent 38%),
    radial-gradient(circle at 75% 90%, rgba(155,231,255,.30), transparent 42%),
    linear-gradient(160deg, var(--cream), var(--baby-pink));
  background-attachment:fixed;
  min-height:100vh;
  overflow-x:hidden;
}

/* sparkle/star texture overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 70% 60%, rgba(255,255,255,.8), transparent),
    radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 90% 40%, rgba(255,255,255,.85), transparent),
    radial-gradient(1.5px 1.5px at 15% 70%, rgba(255,255,255,.7), transparent);
  background-size:300px 300px,250px 250px,200px 200px,350px 350px,280px 280px;
  pointer-events:none;
  z-index:0;
  opacity:.6;
  animation:twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:.35}to{opacity:.75}}

/* ---------- typography ---------- */
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;line-height:1.02;letter-spacing:-.02em;}

.display{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;
  text-transform:uppercase;
}

/* ---------- nav ---------- */
.nav{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  gap:14px;flex-wrap:wrap;
  padding:14px 22px;
  background:rgba(255,46,154,.92);
  backdrop-filter:blur(8px);
  border-bottom:3px solid var(--ink);
}
.nav .brand{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:1.15rem;color:var(--white);
  text-transform:uppercase;letter-spacing:.02em;
  display:flex;align-items:center;gap:8px;text-decoration:none;
  text-shadow:2px 2px 0 var(--ink);
}
.nav-links{display:flex;gap:8px;flex-wrap:wrap;}
.nav-links a{
  font-family:'Sora',sans-serif;font-weight:700;font-size:.82rem;
  text-decoration:none;color:var(--ink);
  background:var(--baby-pink);
  padding:8px 14px;border-radius:999px;
  border:2.5px solid var(--ink);
  transition:transform .15s ease, background .15s ease;
  white-space:nowrap;
}
.nav-links a:hover{transform:translateY(-2px) rotate(-2deg);background:var(--lime);}
.nav-links a.active{background:var(--white);}

/* ---------- layout ---------- */
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:34px 22px 90px;}

.eyebrow{
  display:inline-block;
  font-family:'Sora',sans-serif;font-weight:800;
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--white);background:var(--lilac);
  padding:6px 14px;border-radius:999px;border:2.5px solid var(--ink);
  box-shadow:var(--shadow-hard);
  transform:rotate(-2deg);
}

/* ---------- buttons ---------- */
.btn{
  font-family:'Sora',sans-serif;font-weight:800;
  font-size:.95rem;cursor:pointer;
  background:var(--hot-pink);color:var(--white);
  border:3px solid var(--ink);border-radius:999px;
  padding:14px 26px;
  box-shadow:var(--shadow-hard);
  transition:transform .15s ease, box-shadow .15s ease;
  text-decoration:none;display:inline-block;
  text-transform:uppercase;letter-spacing:.03em;
}
.btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink);}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
.btn.lime{background:var(--lime);color:var(--ink);}
.btn.sky{background:var(--sky);color:var(--ink);}

/* ---------- cards ---------- */
.card{
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:var(--radius);
  box-shadow:var(--shadow-hard);
  padding:22px;
  transition:transform .18s ease, box-shadow .18s ease;
}
.card:hover{transform:translate(-3px,-3px) rotate(-.6deg);box-shadow:9px 9px 0 var(--ink);}

.tag{
  display:inline-block;font-family:'Sora',sans-serif;font-weight:700;
  font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;border:2px solid var(--ink);
  background:var(--baby-pink);color:var(--deep);margin:3px 3px 0 0;
}
.tag.area{background:var(--sky);}
.tag.food{background:var(--bubblegum);color:var(--white);}
.tag.fun{background:var(--lime);}
.tag.culture{background:var(--lilac);color:var(--white);}
.tag.star{background:var(--white);}

/* ---------- footer ---------- */
.foot{
  position:relative;z-index:1;
  text-align:center;padding:30px 20px 50px;
  font-family:'Sora',sans-serif;font-weight:600;font-size:.82rem;color:var(--deep);
}
.foot .heart{color:var(--hot-pink);}

/* marquee */
.marquee{
  overflow:hidden;white-space:nowrap;
  background:var(--ink);color:var(--baby-pink);
  border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);
  padding:10px 0;font-family:'Bricolage Grotesque',sans-serif;
  font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:.9rem;
}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 22s linear infinite;}
@keyframes scroll{to{transform:translateX(-100%);}}

/* utility */
.center{text-align:center;}
.grid{display:grid;gap:20px;}
@media(min-width:640px){.grid.two{grid-template-columns:repeat(2,1fr);}}
@media(min-width:880px){.grid.three{grid-template-columns:repeat(3,1fr);}}

</style>
<style>

<script>
if(sessionStorage.getItem("zara_in")!=="yes"){ window.location.href="index.html"; }

let current="all";
const grid=document.getElementById("placeGrid");
const count=document.getElementById("count");

function typeClass(t){return t==="food"?"food":t==="culture"?"culture":t==="fun"?"fun":"";}
function typeLabel(t){return t==="food"?"café / food":t==="culture"?"culture":t==="fun"?"fun":"vibey";}

function render(){
  const list = current==="all" ? PLACES : PLACES.filter(p=>p.type===current);
  count.textContent = `♡ ${list.length} spots`;
  grid.innerHTML = list.map(p=>`
    <div class="card place">
      <div class="top">
        <span class="emoji">${p.emoji}</span>
        <span class="rating">★ ${p.rating}</span>
      </div>
      <h3 class="display">${p.name}</h3>
      <span class="tag area">${p.area}</span>
      <span class="tag ${typeClass(p.type)}">${typeLabel(p.type)}</span>
      <p class="blurb">${p.blurb}</p>
      ${p.note?`<div class="note">⟡ ${p.note}</div>`:""}
      <a class="maps" href="${p.maps}" target="_blank" rel="noopener">open in maps →</a>
    </div>`).join("");
}
function setFilter(f,btn){
  current=f;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render();
}
render();
</script>
